<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado Divertido para Bebés 👶✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Quicksand:wght@600;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Menú Inicial -->
    <div class="menu-inicial" id="menuInicial">
        <div class="menu-titulo">🎹 TECLADO BEBÉ 👶</div>
        <div class="menu-subtitle">¿Con qué quieres jugar?</div>
        
        <div class="menu-opciones">
            <div class="opcion-boton" data-modo="emoticonos" onclick="seleccionarModo('emoticonos')">
                <div>😊</div>
                <div class="opcion-label">Emoticonos</div>
            </div>
            <div class="opcion-boton" data-modo="numeros" onclick="seleccionarModo('numeros')">
                <div>1️⃣</div>
                <div class="opcion-label">Números</div>
            </div>
            <div class="opcion-boton" data-modo="vocales" onclick="seleccionarModo('vocales')">
                <div>🅰️</div>
                <div class="opcion-label">Vocales</div>
            </div>
        </div>
    </div>

    <button class="boton-menu" id="botonMenu" onclick="mostrarMenu()" style="display: none;">☰ Menú</button>

    <div class="container" id="container"></div>
    <div class="info-text" id="infoText">🎹 ¡Presiona cualquier tecla! 🎉</div>

    <script src="js/script.js"></script>
</body>
</html>
