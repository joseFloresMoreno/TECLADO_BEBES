<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teclado Divertido para BebГ©s рҹ‘¶вңЁ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa502 50%, #26e0da 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .emoji {
            position: fixed;
            font-size: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            animation: float-down 3s ease-in forwards;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        @keyframes float-down {
            0% {
                opacity: 1;
                transform: translateY(-100px) scale(1) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translateY(50vh) scale(1.1) rotate(15deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) scale(0.8) rotate(45deg);
            }
        }

        .bounce {
            animation: bounce-up 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes bounce-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0.5);
            }
        }

        .spin {
            animation: spin-around 2s ease-out forwards;
        }

        @keyframes spin-around {
            0% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0) rotateZ(720deg);
            }
        }

        .info-text {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: bold;
            z-index: 100;
        }

        .pulse-ring {
            position: fixed;
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: pulse 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes pulse {
            0% {
                width: 50px;
                height: 50px;
                opacity: 1;
            }
            100% {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }

        /* Estilos para sonido visual */
        .sound-wave {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            animation: sound-pulse 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes sound-pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    <div class="info-text">рҹҺ№ ВЎPresiona cualquier tecla! рҹҺү</div>

    <script>
        // Array de frutas y emojis divertidos para bebГ©s
        const emojis = [
            'рҹҚҺ', 'рҹҚҠ', 'рҹҚӢ', 'рҹҚҢ', 'рҹҚү', 'рҹҚ“', 'рҹҚ‘', 'рҹҚ’', 'рҹҚҚ', 'рҹҚҲ', 'рҹҚҗ', 'рҹҘқ',
            'рҹҳҠ', 'рҹҳ„', 'рҹҳҚ', 'рҹӨ©', 'рҹҳҶ', 'рҹҳӮ', 'рҹҺү', 'вӯҗ', 'рҹҢҹ', 'рҹ’«', 'вңЁ', 'рҹҺҲ',
            'рҹҰӢ', 'рҹҗқ', 'рҹҗһ', 'рҹҢё', 'рҹҢј', 'рҹҢ»', 'рҹҢә', 'рҹҢ»', 'рҹҺӘ', 'рҹҺЁ', 'рҹҺӯ', 'рҹҺҜ',
            'вқӨпёҸ', 'рҹ’ӣ', 'рҹ’ҡ', 'рҹ’ҷ', 'рҹ’ң', 'рҹ§Ў', 'рҹӨҚ', 'рҹ–Ө', 'рҹ’•', 'рҹ’—', 'рҹ’“', 'рҹ’һ',
            'рҹҡҖ', 'рҹӣё', 'рҹҢҷ', 'вҳҖпёҸ', 'рҹҢҲ', 'вӣ…', 'рҹҢӨпёҸ', 'вӣҲпёҸ'
        ];

        // Array de animaciones disponibles
        const animations = ['float-down', 'bounce-up', 'spin-around'];

        // FunciГіn para reproducir un sonido simple (usando Web Audio API)
        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // Frecuencia aleatoria para un sonido diferentes
                const frequency = 200 + Math.random() * 600;
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            } catch (e) {
                // Si no se puede reproducir sonido, simplemente continГәa
            }
        }

        // FunciГіn para crear un pulso visual
        function createPulseRing(x, y) {
            const ring = document.createElement('div');
            ring.className = 'pulse-ring';
            ring.style.left = (x - 25) + 'px';
            ring.style.top = (y - 25) + 'px';
            document.body.appendChild(ring);
            
            setTimeout(() => ring.remove(), 1500);
        }

        // FunciГіn para crear emojis aleatorios
        function createEmoji(x, y) {
            const emoji = document.createElement('div');
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            const randomAnimation = animations[Math.floor(Math.random() * animations.length)];

            emoji.textContent = randomEmoji;
            emoji.className = 'emoji ' + randomAnimation;
            emoji.style.left = x + 'px';
            emoji.style.top = y + 'px';

            // AГұadir variaciГіn de posiciГіn
            const offsetX = (Math.random() - 0.5) * 200;
            const offsetY = (Math.random() - 0.5) * 200;
            emoji.style.setProperty('--offsetX', offsetX + 'px');
            emoji.style.setProperty('--offsetY', offsetY + 'px');

            document.body.appendChild(emoji);

            // Eliminar elemento despuГ©s de que termine la animaciГіn
            setTimeout(() => emoji.remove(), 3000);
        }

        // Evento para detectar presiГіn de teclas
        document.addEventListener('keydown', (event) => {
            // Obtener posiciГіn aleatoria
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 150);

            // Crear mГәltiples emojis para mГЎs diversiГіn
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createEmoji(x + (Math.random() - 0.5) * 150, y + (Math.random() - 0.5) * 150);
                }, i * 100);
            }

            // Crear pulso visual
            createPulseRing(x, y);

            // Reproducir sonido
            playSound();

            // Efecto visual adicional
            document.body.style.animation = 'none';
            setTimeout(() => {
                document.body.style.animation = 'gradientShift 8s ease infinite';
            }, 10);
        });

        // TambiГ©n detectar clics del ratГіn para bebГ©s con pantalla tГЎctil
        document.addEventListener('click', (event) => {
            const x = event.clientX;
            const y = event.clientY;

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createEmoji(x + (Math.random() - 0.5) * 200, y + (Math.random() - 0.5) * 200);
                }, i * 80);
            }

            createPulseRing(x, y);
            playSound();
        });

        // Evento tГЎctil para dispositivos mГіviles
        document.addEventListener('touchstart', (event) => {
            const touch = event.touches[0];
            const x = touch.clientX;
            const y = touch.clientY;

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createEmoji(x + (Math.random() - 0.5) * 200, y + (Math.random() - 0.5) * 200);
                }, i * 80);
            }

            createPulseRing(x, y);
            playSound();
        });

        // Prevenir comportamiento por defecto en teclas especiales
        document.addEventListener('keydown', (event) => {
            // Teclas de navegaciГіn y espaciador
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(event.code)) {
                event.preventDefault();
            }
            // Tecla Windows/Meta (izquierda y derecha)
            if (['MetaLeft', 'MetaRight'].includes(event.code)) {
                event.preventDefault();
            }
            // Tecla Alt
            if (event.code === 'AltLeft' || event.code === 'AltRight') {
                event.preventDefault();
            }
            // Ctrl+Alt para evitar combinaciones del sistema
            if (event.ctrlKey && (event.code === 'AltLeft' || event.code === 'AltRight')) {
                event.preventDefault();
            }
            // Alt+Tab (no se puede prevenir completamente en todos los navegadores)
            if (event.altKey && event.code === 'Tab') {
                event.preventDefault();
            }
        });

        // Deshabilitar menГә contextual (clic derecho)
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
        });

        // Deshabilitar algunas combinaciones de teclas del navegador
        document.addEventListener('keydown', (event) => {
            // F5 (Recargar)
            if (event.code === 'F5') {
                event.preventDefault();
            }
            // F12 (Herramientas de desarrollo)
            if (event.code === 'F12') {
                event.preventDefault();
            }
            // Ctrl+R (Recargar)
            if (event.ctrlKey && event.code === 'KeyR') {
                event.preventDefault();
            }
            // Ctrl+W (Cerrar pestaГұa)
            if (event.ctrlKey && event.code === 'KeyW') {
                event.preventDefault();
            }
            // Ctrl+T (Nueva pestaГұa)
            if (event.ctrlKey && event.code === 'KeyT') {
                event.preventDefault();
            }
            // Ctrl+Shift+I (Herramientas de desarrollo)
            if (event.ctrlKey && event.shiftKey && event.code === 'KeyI') {
                event.preventDefault();
            }
            // Ctrl+Shift+J (Consola)
            if (event.ctrlKey && event.shiftKey && event.code === 'KeyJ') {
                event.preventDefault();
            }
            // Ctrl+Shift+K (Herramientas de desarrollo)
            if (event.ctrlKey && event.shiftKey && event.code === 'KeyK') {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
